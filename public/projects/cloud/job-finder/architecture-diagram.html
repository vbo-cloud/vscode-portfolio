  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x; padding:8px 11px; display:inline-flex; align-items:center; gap:7px;\"><i data-lucide=\"container\" style=\"width:13px;height:13px; color:#cdd3e0;\"><\u002Fi>ACR<\u002Fspan>\n    <span style=\"font:500 10px/1 'JetBrains Mono'; color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.09); border-radius:8px; padding:8px 11px; display:inline-flex; align-items:center; gap:7px;\"><i data-lucide=\"key-round\" style=\"width:13px;height:13px; color:#cdd3e0;\"><\u002Fi>Key Vault<\u002Fspan>\n    <span style=\"font:500 10px/1 'JetBrains Mono'; color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.09); border-radius:8px; padding:8px 11px; display:inline-flex; align-items:center; gap:7px;\"><i data-lucide=\"id-card\" style=\"width:13px;height:13px; color:#cdd3e0;\"><\u002Fi>Managed Identity<\u002Fspan>\n    <span style=\"font:500 10px/1 'JetBrains Mono'; color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.09); border-radius:8px; padding:8px 11px; display:inline-flex; align-items:center; gap:7px;\"><i data-lucide=\"activity\" style=\"width:13px;height:13px; color:#cdd3e0;\"><\u002Fi>App Insights + Log Analytics<\u002Fspan>\n    <span style=\"font:500 10px/1 'JetBrains Mono'; color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.09); border-radius:8px; padding:8px 11px; display:inline-flex; align-items:center; gap:7px;\"><i data-lucide=\"layers\" style=\"width:13px;height:13px; color:#cdd3e0;\"><\u002Fi>Terraform + GitHub Actions OIDC<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"position:absolute; left:590px; top:520px; z-index:8; font:600 9.5px/1 'JetBrains Mono',monospace; letter-spacing:0.16em; color:rgba(255,255,255,0.3); text-transform:uppercase;\">Plateforme transverse · sécurité · observabilité · livraison<\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const tryIcons = (n = 0) => {\n      if (window.lucide && window.lucide.createIcons) {\n        window.lucide.createIcons();\n        this._draw();\n      } else if (n < 60) {\n        setTimeout(() => tryIcons(n + 1), 80);\n      }\n    };\n    tryIcons();\n    this._onResize = () => this._draw();\n    window.addEventListener('resize', this._onResize);\n  }\n  componentWillUnmount() { if (this._onResize) window.removeEventListener('resize', this._onResize); }\n\n  _absOff(el) {\n    const stop = document.querySelector('[data-screen-label]');\n    let x = 0, y = 0, node = el;\n    while (node && node !== stop) { x += node.offsetLeft; y += node.offsetTop; node = node.offsetParent; }\n    return { x, y };\n  }\n\n  _anchor(id, side, at = 0.5) {\n    const el = document.querySelector('[data-node=\"' + id + '\"]');\n    if (!el) return null;\n    const o = this._absOff(el);\n    const x = o.x, y = o.y, w = el.offsetWidth, h = el.offsetHeight;\n    const R = Math.round;\n    if (side === 't') return { x: R(x + w * at), y: R(y), nx: 0, ny: -1 };\n    if (side === 'b') return { x: R(x + w * at), y: R(y + h), nx: 0, ny: 1 };\n    if (side === 'l') return { x: R(x), y: R(y + h * at), nx: -1, ny: 0 };\n    return { x: R(x + w), y: R(y + h * at), nx: 1, ny: 0 };\n  }\n\n  _ortho(a, b, stub) {\n    const s = stub || 20;\n    const a2 = { x: a.x + a.nx * s, y: a.y + a.ny * s };\n    const b2 = { x: b.x + b.nx * s, y: b.y + b.ny * s };\n    const pts = [{ x: a.x, y: a.y }, a2];\n    const aH = a.nx !== 0, bH = b.nx !== 0;\n    if (aH && bH) { const mx = (a2.x + b2.x) / 2; pts.push({ x: mx, y: a2.y }, { x: mx, y: b2.y }); }\n    else if (!aH && !bH) { const my = (a2.y + b2.y) / 2; pts.push({ x: a2.x, y: my }, { x: b2.x, y: my }); }\n    else if (aH && !bH) { pts.push({ x: b2.x, y: a2.y }); }\n    else { pts.push({ x: a2.x, y: b2.y }); }\n    pts.push(b2, { x: b.x, y: b.y });\n    // dedupe\n    const out = [pts[0]];\n    for (let i = 1; i < pts.length; i++) {\n      const p = pts[i], q = out[out.length - 1];\n      if (Math.abs(p.x - q.x) > 0.5 || Math.abs(p.y - q.y) > 0.5) out.push(p);\n    }\n    return out;\n  }\n\n  _roundedPath(pts, r) {\n    if (pts.length < 3) return 'M ' + pts.map(p => p.x + ' ' + p.y).join(' L ');\n    let d = 'M ' + pts[0].x + ' ' + pts[0].y;\n    for (let i = 1; i < pts.length - 1; i++) {\n      const p0 = pts[i - 1], p1 = pts[i], p2 = pts[i + 1];\n      const d1 = Math.hypot(p1.x - p0.x, p1.y - p0.y);\n      const d2 = Math.hypot(p2.x - p1.x, p2.y - p1.y);\n      const rr = Math.min(r, d1 / 2, d2 / 2);\n      const u1x = (p1.x - p0.x) / (d1 || 1), u1y = (p1.y - p0.y) / (d1 || 1);\n      const u2x = (p2.x - p1.x) / (d2 || 1), u2y = (p2.y - p1.y) / (d2 || 1);\n      const ax = p1.x - u1x * rr, ay = p1.y - u1y * rr;\n      const bx = p1.x + u2x * rr, by = p1.y + u2y * rr;\n      d += ' L ' + ax + ' ' + ay + ' Q ' + p1.x + ' ' + p1.y + ' ' + bx + ' ' + by;\n    }\n    const last = pts[pts.length - 1];\n    d += ' L ' + last.x + ' ' + last.y;\n    return d;\n  }\n\n  _midOfLongest(pts) {\n    let best = 0, bx = pts[0].x, by = pts[0].y, horiz = true;\n    for (let i = 1; i < pts.length; i++) {\n      const dx = pts[i].x - pts[i - 1].x, dy = pts[i].y - pts[i - 1].y;\n      const L = Math.hypot(dx, dy);\n      if (L > best) { best = L; bx = (pts[i].x + pts[i - 1].x) / 2; by = (pts[i].y + pts[i - 1].y) / 2; horiz = Math.abs(dx) >= Math.abs(dy); }\n    }\n    return { x: bx, y: by, horiz };\n  }\n\n  // True midpoint measured along the wire's total length, so labels sit\n  // dead-centre on the connection (equal breathing room on both sides).\n  _midByLength(pts) {\n    const seg = [];\n    let total = 0;\n    for (let i = 1; i < pts.length; i++) {\n      const L = Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);\n      seg.push(L); total += L;\n    }\n    const target = total / 2;\n    let acc = 0;\n    for (let i = 1; i < pts.length; i++) {\n      const L = seg[i - 1];\n      if (acc + L >= target) {\n        const t = L ? (target - acc) / L : 0;\n        return {\n          x: pts[i - 1].x + (pts[i].x - pts[i - 1].x) * t,\n          y: pts[i - 1].y + (pts[i].y - pts[i - 1].y) * t,\n          horiz: Math.abs(pts[i].x - pts[i - 1].x) >= Math.abs(pts[i].y - pts[i - 1].y)\n        };\n      }\n      acc += L;\n    }\n    const last = pts[pts.length - 1];\n    return { x: last.x, y: last.y, horiz: true };\n  }\n\n  _draw() {\n    const svg = document.getElementById('jf-wires');\n    const labels = document.getElementById('jf-labels');\n    if (!svg || !labels) return;\n    [...svg.querySelectorAll('path.jf-wire')].forEach(p => p.remove());\n    labels.innerHTML = '';\n    const NS = 'http://www.w3.org/2000/svg';\n    const C = { blue: '#7ea9f0', green: '#4fd39a', slate: '#99a1b3', amber: '#f4c150' };\n    const AH = { blue: 'ah-blue', green: 'ah-green', slate: 'ah-slate', amber: 'ah-amber' };\n\n    const conns = [\n      // ---- STEP 1 ----\n      { f: ['s1_candidat', 'r'], t: ['s1_frontend', 'l'], c: 'blue', k: 'flow', n: '1', lb: 'Se connecter' },\n      { f: ['s1_frontend', 'r'], t: ['s1_entra', 'l'], c: 'blue', k: 'flow', n: '2', lb: 'redirect OIDC' },\n      { f: ['s1_entra', 'b', 0.35], t: ['s1_frontend', 'b', 0.65], c: 'blue', k: 'auth', n: '3', lb: 'JWT', onLine: true },\n      { f: ['s1_frontend', 't', 0.6], t: ['s1_api', 't', 0.5], c: 'blue', k: 'auth', n: '4', lb: 'Bearer JWT', onLine: true },\n      // ---- STEP 2 ----\n      { f: ['s2_frontend', 'r'], t: ['s2_api', 'l'], c: 'blue', k: 'flow', n: '1', lb: 'upload' },\n      { f: ['s2_api', 'r', 0.3], t: ['s2_blob', 'l'], c: 'slate', k: 'data', n: '2', lb: 'PDF' },\n      { f: ['s2_api', 'r', 0.5], t: ['s2_openai', 'l'], c: 'slate', k: 'data', lb: 'embed' },\n      { f: ['s2_api', 'r', 0.7], t: ['s2_pg', 'l'], c: 'slate', k: 'data', lb: 'insert' },\n      { f: ['s2_blob', 'r'], t: ['s2_sb', 'l'], c: 'green', k: 'msg', n: '3', lb: 'publie', onLine: true },\n      { f: ['s2_sb', 'b'], t: ['s2_cvana', 't'], c: 'green', k: 'msg', n: '4', lb: 'réveille' },\n      // ---- STEP 3 ----\n      { f: ['s3_cvana', 't'], t: ['s3_openai', 'b'], c: 'slate', k: 'data', lb: 'ROME' },\n      { f: ['s3_cvana', 'r'], t: ['s3_offerq', 'l'], c: 'green', k: 'msg', n: '1', lb: 'publie', onLine: true },\n      { f: ['s3_offerq', 'r'], t: ['s3_matching', 'l'], c: 'green', k: 'msg', n: '2', lb: 'consomme', onLine: true },\n      { f: ['s3_matching', 'b'], t: ['s3_pg', 't'], c: 'slate', k: 'data', n: '3', lb: 'matches' },\n      { f: ['s3_matching', 'r'], t: ['s3_matchq', 'l'], c: 'green', k: 'msg', n: '4', lb: 'publie', onLine: true },\n      // ---- STEP 4 ----\n      { f: ['s4_frontend', 'r'], t: ['s4_api', 'l'], c: 'blue', k: 'flow', n: '1', lb: 'GET /matches' },\n      { f: ['s4_api', 'r'], t: ['s4_pg', 'l'], c: 'slate', k: 'data', n: '2', lb: '⋈ offers' },\n      { f: ['s4_pg', 'b', 0.7], t: ['s4_api', 'b', 0.7], c: 'blue', k: 'flow', n: '3', lb: 'résultats' },\n      { f: ['s4_frontend', 'b', 0.5], t: ['s4_ft', 'l'], c: 'slate', k: 'data', lb: 'ouvre' },\n      // ---- PART 2 ----\n      { f: ['p2_ft', 'r'], t: ['p2_fetch', 'l'], c: 'blue', k: 'flow', lb: 'OAuth2 · /offres/search' },\n      { f: ['p2_fetch', 't', 0.7], t: ['p2_openai', 'l'], c: 'slate', k: 'data', lb: 'embed' },\n      { f: ['p2_fetch', 'r', 0.5], t: ['p2_pg', 'l', 0.517], c: 'slate', k: 'data', lb: 'upsert offers' },\n      { f: ['p2_fetch', 'b', 0.55], t: ['p2_offerq', 'l'], c: 'green', k: 'msg', lb: 'offer-ready' },\n      { f: ['p2_offerq', 'r'], t: ['p2_matching', 'l'], c: 'green', k: 'msg', lb: 'consomme' },\n      { f: ['p2_matching', 'r'], t: ['p2_pg', 'l', 0.75], c: 'slate', k: 'data', lb: 'cosinus → matches' },\n      { f: ['p2_cleanup', 'r'], t: ['p2_pg', 'b', 0.5], c: 'amber', k: 'timer', lb: 'purge (2 j)' },\n      // ---- PART 3 ----\n      { f: ['g_user', 'r'], t: ['g_frontend', 'l'], c: 'blue', k: 'flow', lb: 'HTTPS' },\n      { f: ['g_frontend', 'r'], t: ['g_api', 'l'], c: 'blue', k: 'flow', lb: 'REST · JWT' },\n      { f: ['g_frontend', 'b'], t: ['g_entra', 't'], c: 'blue', k: 'auth', lb: 'OIDC' },\n      { f: ['g_entra', 'r'], t: ['g_api', 'b', 0.3], c: 'blue', k: 'auth', lb: 'valide JWT' },\n      { f: ['g_api', 'r'], t: ['g_sb', 'l'], c: 'green', k: 'msg', lb: 'publie' },\n      { f: ['g_sb', 'r'], t: ['g_agents', 'l', 0.535], c: 'green', k: 'msg', lb: 'déclenche' },\n      { f: ['g_agents', 'l', 0.12], t: ['g_sb', 't', 0.5], c: 'green', k: 'msg', lb: 'événements' },\n      { f: ['g_fetch', 'r'], t: ['g_pg', 'l', 0.569], c: 'slate', k: 'data', lb: 'lit / écrit' },\n      { f: ['g_match', 'r'], t: ['g_openai', 'l', 0.552], c: 'slate', k: 'data' },\n      { f: ['g_api', 'b', 0.7], t: ['g_blob', 'b', 0.5], c: 'slate', k: 'data', lb: 'CV PDF', via: [[723, 400], [1545, 400], [1545, 354]] },\n      { f: ['g_ft', 't', 0.5], t: ['g_agents', 'b', 0.5], c: 'blue', k: 'flow', lb: 'fetch offres' }\n    ];\n\n    conns.forEach(cn => {\n      const a = this._anchor(cn.f[0], cn.f[1], cn.f[2]);\n      const b = this._anchor(cn.t[0], cn.t[1], cn.t[2]);\n      if (!a || !b) return;\n      const pts = cn.via\n        ? [{ x: a.x, y: a.y }, ...cn.via.map(p => ({ x: p[0], y: p[1] }))]\n        : this._ortho(a, b, cn.stub);\n      const d = this._roundedPath(pts, cn.r != null ? cn.r : 10);\n      const mid = this._midByLength(pts);\n      const path = document.createElementNS(NS, 'path');\n      path.setAttribute('class', 'jf-wire');\n      path.setAttribute('d', d);\n      path.setAttribute('fill', 'none');\n      path.setAttribute('stroke', C[cn.c]);\n      path.setAttribute('stroke-linecap', 'round');\n      path.setAttribute('stroke-linejoin', 'round');\n      path.setAttribute('marker-end', 'url(#' + AH[cn.c] + ')');\n      if (cn.k === 'flow') { path.setAttribute('stroke-width', '2.2'); path.setAttribute('opacity', '0.95'); }\n      else if (cn.k === 'msg') { path.setAttribute('stroke-width', '2'); path.setAttribute('stroke-dasharray', '8 6'); path.style.animation = 'jfflow 2.4s linear infinite'; path.setAttribute('opacity', '0.95'); }\n      else if (cn.k === 'data') { path.setAttribute('stroke-width', '1.5'); path.setAttribute('stroke-dasharray', '1.5 5.5'); path.setAttribute('opacity', '0.55'); }\n      else if (cn.k === 'auth') { path.setAttribute('stroke-width', '1.6'); path.setAttribute('stroke-dasharray', '6 5'); path.setAttribute('opacity', '0.62'); }\n      else if (cn.k === 'timer') { path.setAttribute('stroke-width', '1.7'); path.setAttribute('stroke-dasharray', '6 5'); path.setAttribute('opacity', '0.85'); }\n      svg.appendChild(path);\n\n      if (false && cn.lb) {\n        const pill = document.createElement('div');\n        pill.style.cssText = 'position:absolute; visibility:hidden; display:inline-flex; align-items:center; gap:6px; background:rgba(8,8,12,0.94); border:1px solid ' + C[cn.c] + '55; border-radius:999px; padding:3px 9px; white-space:nowrap; font:500 10px/1 \\'JetBrains Mono\\',monospace; color:rgba(255,255,255,0.78);';\n        if (cn.n) {\n          const badge = document.createElement('span');\n          badge.textContent = cn.n;\n          badge.style.cssText = 'display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:999px; background:' + C[cn.c] + '; color:#08080c; font:700 9.5px/1 \\'JetBrains Mono\\';';\n          pill.appendChild(badge);\n        }\n        const txt = document.createElement('span');\n        txt.textContent = cn.lb;\n        pill.appendChild(txt);\n        labels.appendChild(pill);\n        // Sit the pill dead-centre on the wire; its opaque background masks\n        // the line beneath, leaving clear breathing room on either side.\n        const lx = mid.x, ly = mid.y;\n        pill.style.left = (lx + (cn.ldx || 0)) + 'px';\n        pill.style.top = (ly + (cn.ldy || 0)) + 'px';\n        pill.style.transform = 'translate(-50%,-50%)';\n        pill.style.visibility = 'visible';\n      }\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
